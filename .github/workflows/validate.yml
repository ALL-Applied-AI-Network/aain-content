name: Validate Content

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run content validation
        id: validate
        run: npm run validate 2>&1 | tee validation-output.txt

      - name: Comment validation results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('validation-output.txt', 'utf8');
            const success = '${{ steps.validate.outcome }}' === 'success';
            const icon = success ? ':white_check_mark:' : ':x:';
            const status = success ? 'passed' : 'failed';

            const body = `## ${icon} Content Validation ${status}

            <details>
            <summary>Validation output</summary>

            \`\`\`
            ${output.slice(0, 60000)}
            \`\`\`

            </details>`;

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('Content Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
