<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="url(#brand)" stroke-width="1"/>
    </marker>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Unstructured text blob -->
  <g transform="translate(50,55)" fill="none" stroke="url(#brand)" stroke-width="1.8">
    <rect width="80" height="90" rx="5" stroke-opacity="0.4"/>
    <line x1="10" y1="15" x2="70" y2="15" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="10" y1="25" x2="55" y2="25" stroke-width="1" stroke-opacity="0.25"/>
    <line x1="10" y1="35" x2="65" y2="35" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="10" y1="45" x2="48" y2="45" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="10" y1="55" x2="60" y2="55" stroke-width="1" stroke-opacity="0.25"/>
    <line x1="10" y1="65" x2="42" y2="65" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="10" y1="75" x2="58" y2="75" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <!-- Arrow -->
  <line x1="145" y1="100" x2="185" y2="100" stroke="url(#brand)" stroke-width="1.5" marker-end="url(#arr)" stroke-opacity="0.6"/>
  <!-- Structured JSON object -->
  <g transform="translate(200,45)" fill="none" stroke="url(#brand)" stroke-width="1.8">
    <rect width="150" height="110" rx="6" fill="url(#brand)" fill-opacity="0.06"/>
    <!-- Curly brace top -->
    <text x="12" y="20" fill="url(#brand)" font-family="monospace" font-size="11" opacity="0.7">{</text>
    <!-- Key-value pairs -->
    <text x="22" y="36" fill="url(#brand)" font-family="monospace" font-size="9" opacity="0.5">"name": "..."</text>
    <text x="22" y="52" fill="url(#brand)" font-family="monospace" font-size="9" opacity="0.5">"price": 29.99</text>
    <text x="22" y="68" fill="url(#brand)" font-family="monospace" font-size="9" opacity="0.5">"valid": true</text>
    <text x="22" y="84" fill="url(#brand)" font-family="monospace" font-size="9" opacity="0.5">"tags": [...]</text>
    <text x="12" y="100" fill="url(#brand)" font-family="monospace" font-size="11" opacity="0.7">}</text>
    <!-- Checkmark -->
    <g transform="translate(125, 8)">
      <circle r="10" fill="url(#brand)" fill-opacity="0.15" stroke="url(#brand)" stroke-width="1.2"/>
      <path d="M-4,0 L-1,3 L5,-4" fill="none" stroke="url(#brand)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Labels -->
  <text x="90" y="170" text-anchor="middle" fill="url(#brand)" font-family="monospace" font-size="8" opacity="0.45">unstructured</text>
  <text x="275" y="170" text-anchor="middle" fill="url(#brand)" font-family="monospace" font-size="8" opacity="0.45">structured</text>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Structured Outputs</text>
</svg>
