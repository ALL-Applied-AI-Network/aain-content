<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="url(#brand)" stroke-width="1"/>
    </marker>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Documents stack -->
  <g transform="translate(65,65)" fill="none" stroke="url(#brand)" stroke-width="1.8">
    <!-- Doc 3 (back) -->
    <rect x="8" y="-6" width="40" height="52" rx="3" stroke-opacity="0.25"/>
    <!-- Doc 2 (mid) -->
    <rect x="4" y="-3" width="40" height="52" rx="3" stroke-opacity="0.4"/>
    <!-- Doc 1 (front) -->
    <rect x="0" y="0" width="40" height="52" rx="3"/>
    <line x1="7" y1="12" x2="33" y2="12" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="7" y1="20" x2="28" y2="20" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="7" y1="28" x2="30" y2="28" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="7" y1="36" x2="25" y2="36" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <!-- Arrow: docs to vector space -->
  <line x1="120" y1="95" x2="150" y2="95" stroke="url(#brand)" stroke-width="1.5" marker-end="url(#arr)" stroke-opacity="0.6"/>
  <!-- Vector space (scattered points in a cloud) -->
  <g transform="translate(200,90)">
    <ellipse rx="45" ry="42" fill="none" stroke="url(#brand)" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,3"/>
    <!-- Vector dots clustered -->
    <circle cx="-15" cy="-18" r="3" fill="url(#brand)" opacity="0.7"/>
    <circle cx="10" cy="-12" r="3" fill="url(#brand)" opacity="0.6"/>
    <circle cx="-5" cy="5" r="3" fill="url(#brand)" opacity="0.5"/>
    <circle cx="18" cy="8" r="3" fill="url(#brand)" opacity="0.65"/>
    <circle cx="-20" cy="12" r="3" fill="url(#brand)" opacity="0.45"/>
    <circle cx="5" cy="22" r="3" fill="url(#brand)" opacity="0.5"/>
    <circle cx="25" cy="-5" r="3" fill="url(#brand)" opacity="0.55"/>
    <!-- Query point (highlighted) -->
    <circle cx="-8" cy="-5" r="5" fill="url(#brand)" fill-opacity="0.3" stroke="url(#brand)" stroke-width="1.5"/>
    <!-- Connection lines to nearest -->
    <line x1="-8" y1="-5" x2="-15" y2="-18" stroke="url(#brand)" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="-8" y1="-5" x2="10" y2="-12" stroke="url(#brand)" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="-8" y1="-5" x2="-5" y2="5" stroke="url(#brand)" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>
  <!-- Arrow: vector space to response -->
  <line x1="252" y1="95" x2="282" y2="95" stroke="url(#brand)" stroke-width="1.5" marker-end="url(#arr)" stroke-opacity="0.6"/>
  <!-- Response bubble -->
  <g transform="translate(290,70)" fill="none" stroke="url(#brand)" stroke-width="1.8">
    <rect width="65" height="50" rx="10" fill="url(#brand)" fill-opacity="0.08"/>
    <line x1="12" y1="17" x2="53" y2="17" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="12" y1="27" x2="48" y2="27" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="12" y1="37" x2="38" y2="37" stroke-width="1" stroke-opacity="0.25"/>
  </g>
  <!-- Labels -->
  <text x="85" y="145" text-anchor="middle" fill="url(#brand)" font-family="monospace" font-size="8" opacity="0.45">docs</text>
  <text x="200" y="148" text-anchor="middle" fill="url(#brand)" font-family="monospace" font-size="8" opacity="0.45">vectors</text>
  <text x="322" y="145" text-anchor="middle" fill="url(#brand)" font-family="monospace" font-size="8" opacity="0.45">answer</text>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">RAG Fundamentals</text>
</svg>