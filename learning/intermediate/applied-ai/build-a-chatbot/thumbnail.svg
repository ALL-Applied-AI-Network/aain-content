<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Chat interface frame -->
  <g transform="translate(115,30)" fill="none" stroke="url(#brand)" stroke-width="2">
    <rect width="170" height="195" rx="10"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="170" height="28" rx="10" fill="url(#brand)" fill-opacity="0.08" stroke="none"/>
    <line x1="0" y1="28" x2="170" y2="28" stroke-opacity="0.5"/>
    <!-- Bot avatar in header -->
    <circle cx="20" cy="14" r="7" stroke-opacity="0.6"/>
    <circle cx="17" cy="12" r="1.2" fill="url(#brand)" opacity="0.6"/>
    <circle cx="23" cy="12" r="1.2" fill="url(#brand)" opacity="0.6"/>
    <path d="M16,16 Q20,19 24,16" stroke-opacity="0.5" stroke-width="1"/>
    <!-- User message -->
    <rect x="55" y="42" width="100" height="24" rx="12" stroke-opacity="0.5"/>
    <line x1="68" y1="54" x2="142" y2="54" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Bot message -->
    <rect x="15" y="78" width="115" height="36" rx="12" fill="url(#brand)" fill-opacity="0.06"/>
    <line x1="28" y1="90" x2="115" y2="90" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="28" y1="102" x2="90" y2="102" stroke-width="1" stroke-opacity="0.25"/>
    <!-- User message 2 -->
    <rect x="70" y="126" width="85" height="24" rx="12" stroke-opacity="0.5"/>
    <line x1="83" y1="138" x2="142" y2="138" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Streaming dots (typing indicator) -->
    <g transform="translate(25,162)">
      <circle cx="0" cy="0" r="3" fill="url(#brand)" opacity="0.6">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.4s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="0" r="3" fill="url(#brand)" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="24" cy="0" r="3" fill="url(#brand)" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- Input bar at bottom -->
    <rect x="8" y="175" width="154" height="14" rx="7" stroke-opacity="0.3"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Build a Chatbot</text>
</svg>