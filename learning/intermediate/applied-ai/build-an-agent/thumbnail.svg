<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <marker id="cyc" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="url(#brand)" stroke-width="1"/>
    </marker>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Agent loop: Think -> Act -> Observe, arranged in a triangle/circle -->
  <g transform="translate(200,110)">
    <!-- Circular path (invisible guide) -->
    <!-- Think node (top) -->
    <g transform="translate(0,-55)">
      <circle r="28" fill="url(#brand)" fill-opacity="0.08" stroke="url(#brand)" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" fill="url(#brand)" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Think</text>
    </g>
    <!-- Act node (bottom right) -->
    <g transform="translate(52,32)">
      <circle r="28" fill="url(#brand)" fill-opacity="0.08" stroke="url(#brand)" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" fill="url(#brand)" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Act</text>
    </g>
    <!-- Observe node (bottom left) -->
    <g transform="translate(-52,32)">
      <circle r="28" fill="url(#brand)" fill-opacity="0.08" stroke="url(#brand)" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" fill="url(#brand)" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Observe</text>
    </g>
    <!-- Curved arrows connecting them -->
    <!-- Think -> Act -->
    <path d="M18,-35 C35,-20 45,-5 42,5" fill="none" stroke="url(#brand)" stroke-width="2" marker-end="url(#cyc)"/>
    <!-- Act -> Observe -->
    <path d="M30,52 C15,62 -15,62 -30,52" fill="none" stroke="url(#brand)" stroke-width="2" marker-end="url(#cyc)"/>
    <!-- Observe -> Think -->
    <path d="M-42,5 C-45,-5 -35,-20 -18,-35" fill="none" stroke="url(#brand)" stroke-width="2" marker-end="url(#cyc)"/>
    <!-- Center sparkle -->
    <g fill="url(#brand)" opacity="0.4">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z"/>
    </g>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Build an Agent</text>
</svg>