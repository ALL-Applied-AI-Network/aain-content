<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Bug icon with magnifying glass -->
  <g transform="translate(200,115)" fill="none" stroke="url(#brand)" stroke-width="2">
    <!-- Bug body -->
    <ellipse cx="-20" cy="0" rx="22" ry="28"/>
    <line x1="-20" y1="-28" x2="-20" y2="28" stroke-width="1.5"/>
    <!-- Bug legs -->
    <line x1="-42" y1="-15" x2="-55" y2="-25" stroke-width="1.5"/>
    <line x1="-42" y1="0" x2="-58" y2="0" stroke-width="1.5"/>
    <line x1="-42" y1="15" x2="-55" y2="25" stroke-width="1.5"/>
    <line x1="2" y1="-15" x2="15" y2="-25" stroke-width="1.5"/>
    <line x1="2" y1="0" x2="18" y2="0" stroke-width="1.5"/>
    <line x1="2" y1="15" x2="15" y2="25" stroke-width="1.5"/>
    <!-- Antennae -->
    <line x1="-30" y1="-28" x2="-40" y2="-42" stroke-width="1.5"/>
    <line x1="-10" y1="-28" x2="0" y2="-42" stroke-width="1.5"/>
    <circle cx="-40" cy="-42" r="2.5" fill="url(#brand)"/>
    <circle cx="0" cy="-42" r="2.5" fill="url(#brand)"/>
    <!-- Magnifying glass -->
    <circle cx="45" cy="-10" r="24" stroke-width="2.5"/>
    <line x1="62" y1="7" x2="80" y2="30" stroke-width="3" stroke-linecap="round"/>
    <!-- AI sparkle inside magnifying glass -->
    <path d="M45,-15 L47,-10 L52,-8 L47,-6 L45,-1 L43,-6 L38,-8 L43,-10 Z" fill="url(#brand)" opacity="0.7"/>
    <!-- Error text hint -->
    <text x="-20" y="55" text-anchor="middle" fill="#d946ef" font-family="monospace" font-size="10" opacity="0.5">TypeError</text>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Debugging with AI</text>
</svg>
