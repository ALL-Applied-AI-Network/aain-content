<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Terminal window -->
  <g transform="translate(130,40)" fill="none" stroke="url(#brand)" stroke-width="2">
    <rect width="155" height="80" rx="6"/>
    <line x1="0" y1="16" x2="155" y2="16"/>
    <circle cx="10" cy="8" r="2" fill="#ff5f57"/>
    <circle cx="20" cy="8" r="2" fill="#febc2e"/>
    <circle cx="30" cy="8" r="2" fill="#28c840"/>
    <!-- Terminal prompt -->
    <text x="12" y="36" fill="url(#brand)" font-family="monospace" font-size="10" opacity="0.7">&gt; ls ~/projects</text>
    <text x="12" y="50" fill="url(#brand)" font-family="monospace" font-size="10" opacity="0.5">app/ data/ README</text>
    <text x="12" y="66" fill="url(#brand)" font-family="monospace" font-size="10" opacity="0.7">&gt; _</text>
  </g>
  <!-- Folder tree below -->
  <g transform="translate(150,145)" fill="none" stroke="url(#brand)" stroke-width="1.5">
    <!-- Root folder -->
    <rect x="0" y="0" width="18" height="14" rx="2" stroke-opacity="0.8"/>
    <line x1="0" y1="5" x2="8" y2="5" stroke-opacity="0.8"/>
    <!-- Branch lines -->
    <line x1="9" y1="14" x2="9" y2="30"/>
    <line x1="9" y1="30" x2="30" y2="30"/>
    <line x1="9" y1="30" x2="9" y2="55"/>
    <line x1="9" y1="55" x2="30" y2="55"/>
    <line x1="9" y1="55" x2="9" y2="80"/>
    <line x1="9" y1="80" x2="30" y2="80"/>
    <!-- Sub folders/files -->
    <rect x="32" y="23" width="16" height="13" rx="2" stroke-opacity="0.6"/>
    <line x1="32" y1="28" x2="38" y2="28" stroke-opacity="0.6"/>
    <rect x="32" y="48" width="16" height="13" rx="2" stroke-opacity="0.6"/>
    <line x1="32" y1="53" x2="38" y2="53" stroke-opacity="0.6"/>
    <!-- File icon -->
    <rect x="32" y="74" width="13" height="16" rx="1.5" stroke-opacity="0.5"/>
    <line x1="36" y1="80" x2="42" y2="80" stroke-opacity="0.4"/>
    <line x1="36" y1="84" x2="40" y2="84" stroke-opacity="0.4"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Files, Folders &amp; Terminal</text>
</svg>