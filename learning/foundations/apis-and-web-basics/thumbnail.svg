<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Request/Response arrows -->
  <g transform="translate(200,120)" fill="none" stroke="url(#brand)" stroke-width="2">
    <!-- Client box -->
    <rect x="-120" y="-40" width="70" height="50" rx="6" stroke-width="1.5"/>
    <text x="-85" y="-10" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Client</text>
    <!-- Server box -->
    <rect x="50" y="-40" width="70" height="50" rx="6" stroke-width="1.5"/>
    <text x="85" y="-10" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Server</text>
    <!-- Request arrow -->
    <line x1="-45" y1="-25" x2="45" y2="-25" stroke-width="2"/>
    <polygon points="45,-25 38,-29 38,-21" fill="url(#brand)"/>
    <text x="0" y="-32" text-anchor="middle" fill="#a855f7" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="400">GET /api</text>
    <!-- Response arrow -->
    <line x1="45" y1="0" x2="-45" y2="0" stroke-width="2"/>
    <polygon points="-45,0 -38,-4 -38,4" fill="url(#brand)"/>
    <text x="0" y="15" text-anchor="middle" fill="#00d4ff" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="400">{ JSON }</text>
    <!-- JSON bracket decorations -->
    <text x="-85" y="45" text-anchor="middle" fill="url(#brand)" font-family="monospace" font-size="24" opacity="0.4">{ }</text>
    <text x="85" y="45" text-anchor="middle" fill="url(#brand)" font-family="monospace" font-size="24" opacity="0.4">200</text>
    <!-- Connection dots -->
    <circle cx="-50" cy="-25" r="3" fill="url(#brand)"/>
    <circle cx="50" cy="-25" r="3" fill="url(#brand)"/>
    <circle cx="-50" cy="0" r="3" fill="url(#brand)"/>
    <circle cx="50" cy="0" r="3" fill="url(#brand)"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">APIs &amp; Web Basics</text>
</svg>
