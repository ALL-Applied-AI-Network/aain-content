<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Isolated boxes representing virtual environments -->
  <g transform="translate(200,115)" fill="none" stroke="url(#brand)" stroke-width="2">
    <!-- Outer container -->
    <rect x="-90" y="-55" width="80" height="90" rx="8" stroke-dasharray="5,3" opacity="0.6"/>
    <rect x="10" y="-55" width="80" height="90" rx="8" stroke-dasharray="5,3" opacity="0.6"/>
    <!-- Inner package blocks -->
    <rect x="-80" y="-42" width="60" height="16" rx="3" fill="url(#brand)" opacity="0.3"/>
    <rect x="-80" y="-20" width="45" height="16" rx="3" fill="url(#brand)" opacity="0.2"/>
    <rect x="-80" y="2" width="55" height="16" rx="3" fill="url(#brand)" opacity="0.15"/>
    <rect x="20" y="-42" width="50" height="16" rx="3" fill="url(#brand)" opacity="0.3"/>
    <rect x="20" y="-20" width="60" height="16" rx="3" fill="url(#brand)" opacity="0.2"/>
    <rect x="20" y="2" width="40" height="16" rx="3" fill="url(#brand)" opacity="0.15"/>
    <!-- Labels -->
    <text x="-50" y="-60" text-anchor="middle" fill="#a855f7" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500">.venv A</text>
    <text x="50" y="-60" text-anchor="middle" fill="#00d4ff" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500">.venv B</text>
    <!-- Separation indicator -->
    <line x1="0" y1="-55" x2="0" y2="35" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <!-- Python logo hint -->
    <circle cx="-50" cy="55" r="4" fill="url(#brand)" opacity="0.6"/>
    <circle cx="50" cy="55" r="4" fill="url(#brand)" opacity="0.6"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Virtual Environments</text>
</svg>
