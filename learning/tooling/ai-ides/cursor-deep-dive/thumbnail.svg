<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0d1f" rx="12"/>
  <!-- Cursor-style editor icon -->
  <g transform="translate(165,50)" fill="none" stroke="url(#brand)" stroke-width="2">
    <!-- Editor window -->
    <rect width="80" height="100" rx="8"/>
    <line x1="0" y1="18" x2="80" y2="18" stroke-opacity="0.5"/>
    <!-- Tab indicator -->
    <rect x="5" y="4" width="25" height="10" rx="3" fill="url(#brand)" fill-opacity="0.15" stroke="none"/>
    <!-- Code lines -->
    <line x1="10" y1="30" x2="45" y2="30" stroke-width="1.3" stroke-opacity="0.5"/>
    <line x1="16" y1="42" x2="60" y2="42" stroke-width="1.3" stroke-opacity="0.4"/>
    <line x1="16" y1="54" x2="50" y2="54" stroke-width="1.3" stroke-opacity="0.35"/>
    <line x1="10" y1="66" x2="35" y2="66" stroke-width="1.3" stroke-opacity="0.5"/>
    <line x1="16" y1="78" x2="55" y2="78" stroke-width="1.3" stroke-opacity="0.4"/>
    <line x1="10" y1="90" x2="30" y2="90" stroke-width="1.3" stroke-opacity="0.45"/>
  </g>
  <!-- Magnifying glass overlapping the editor -->
  <g transform="translate(260,120)" fill="none" stroke="url(#brand)" stroke-width="2.5">
    <circle r="25"/>
    <line x1="17" y1="17" x2="32" y2="32" stroke-width="3" stroke-linecap="round"/>
    <!-- Lens highlight -->
    <path d="M-10,-18 C-5,-22 5,-22 10,-18" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>
  <!-- Inner lens: zoomed code detail -->
  <g transform="translate(260,120)" fill="url(#brand)" font-family="monospace" font-size="6" opacity="0.5">
    <text x="-14" y="-5">def main():</text>
    <text x="-10" y="4">return ai</text>
  </g>
  <!-- Sparkles indicating AI features -->
  <g fill="url(#brand)">
    <path transform="translate(145,70)" d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" opacity="0.4"/>
    <path transform="translate(305,80)" d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" opacity="0.35"/>
  </g>
  <text x="200" y="275" text-anchor="middle" fill="#e8e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Cursor Deep Dive</text>
</svg>